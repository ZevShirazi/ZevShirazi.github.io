title: "Zev Shirazi"
email: "zev.shirazi [at] cs [dot] ox [dot] ac [dot] uk"
description: >-
  PhD student in Computer Science at the University of Oxford working on the theory of monads.
minimal_mistakes_skin: default
search: true
timezone: "Europe/London"

markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Zev Shirazi"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "PhD student in Computer Science at the University of Oxford."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "/"
footer:
  links:
    - label: "Contact"
      icon: "fas fa-fw fa-envelope"
      url: "/about/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
